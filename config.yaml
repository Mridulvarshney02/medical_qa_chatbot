# Configuration for medical-qa-chatbot QLoRA fine-tuning + serving.
# All paths and hyperparameters are read from here. Secrets (HF_TOKEN) come from .env / env vars only.

model:
  # Base model to fine-tune. The HF gated repo requires accepting the license + an HF_TOKEN.
  base_model_id: "mistralai/Mistral-7B-Instruct-v0.2"
  # If you use a different tokenizer repo, set it here (defaults to base_model_id when null).
  tokenizer_id: null

# 4-bit (QLoRA) quantization config — bitsandbytes NF4 + double quant + bfloat16 compute.
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

# LoRA / PEFT adapter config.
lora:
  r: 64
  lora_alpha: 16
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"
  # Linear projections inside Mistral's attention + MLP blocks.
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# SFTTrainer / TrainingArguments.
training:
  output_dir: "adapters/mistral-medical-qa"
  max_steps: 100          # set to -1 to train by epochs instead
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  lr_scheduler_type: "constant"
  logging_steps: 10
  eval_steps: 20
  save_strategy: "steps"
  save_steps: 50
  max_seq_length: 1024
  bf16: true              # use bf16 on Ampere+ (A10/A100); set fp16:true instead on T4
  fp16: false
  report_to: "none"       # set to "wandb" if you want experiment tracking

data:
  dataset_path: "data/medical_dataset.json"
  val_size: 29            # last 29 of 329 records held out for eval
  seed: 42

merge:
  merged_output_dir: "models/mistral-medical-qa-merged"

inference:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: true
